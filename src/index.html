<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>todo-app</title>
  <link rel="stylesheet" href="./scss/styles.scss">
</head>

<body>
  <div class="container">
    <div class="card p-3">
      <h1 class="text-center">To-do-list</h1>
      <div class="row g-2 input-box">
        <div class="col-md-5">
          <input type="text" id="taskInput" class="form-control" placeholder="Enter task">
        </div>
        <div class="col-md-3">
          <select id="preferenceInput" class="form-select">
            <option value="" selected>-- Select an option --</option>
            <option value="High">High🟥</option>
            <option value="Medium" selected>Medium🟨</option>
            <option value="Low">Low🟩</option>
          </select>
        </div>

        <div class="col-md-2">
          <input type="time" id="timeInput" class="form-control">
        </div>
        <div class="col-md-2 d-grid">
          <button id="addBtn" class="btn btn-primary">Add Task</button>
        </div>
      </div>

      <div class="row g-2">
        <div class="sort-box col-md-5">
          <select id="sortInput" class="form-select">
            <option value="" disabled selected>Sort By</option>
            <option value="Time">Time</option>
            <option value="Preference" selected>Preference</option>
          </select>
        </div>
        <div class="search-box col-md-5">
          <input type="search" name="searchInput" id="searchInput">
          <button class="btn primary-btn">Search</button>
        </div>
      </div>

      <ul id="taskList" class="list-group mt-4">
      </ul>

      <h3 class=contenteditable></h3>
    </div>

    <div class="alert-container">
      <div class="alert-box d-flex justify-content-center align-items-center">
        <div class="message"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
